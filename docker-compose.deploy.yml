# ================================================================
# Server deployment stack (staging / prod VM) — STANDALONE.
#
# Pulls pre-built images from GHCR and runs the full stack:
# postgres (app DB), postgres-tfstate (Terraform state), keycloak
# (+ its postgres), rabbitmq, redis, backend, worker, frontend,
# nginx (TLS reverse proxy).
#
#   docker compose -f docker-compose.deploy.yml up -d
#
# DB migrations are NOT part of this compose file — the Ansible
# playbook runs `docker exec backend-prod python -m alembic upgrade
# head` after the stack is up so failures land in the playbook log
# instead of being buried in compose output.
#
# This file mirrors docker-compose.dev.yml service-for-service.
# Differences vs dev:
#   - Pulls GHCR images instead of building locally.
#   - Source-mount and ssh-key-mount removed (prod uses GIT_ACCESS_TOKEN).
#   - pgadmin removed.
#   - Required env vars use ${VAR:?required} so a missing .env on the
#     VM stops compose-up immediately (e.g. SECRET_KEY, APP_BASE_URL,
#     CORS_ORIGINS — vars that have unsafe localhost / dev defaults
#     in dev.yml).
#   - Adds resource limits and json-file log rotation per service.
#   - nginx terminates TLS on :443 and reverse-proxies to frontend,
#     backend (/api/), and keycloak (/auth/). Frontend, backend and
#     keycloak no longer expose ports directly to the host.
# ================================================================
services:
  # ----------------------------------------------------------------
  # PostgreSQL Database (application)
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - worker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------------
  # PostgreSQL Database (Terraform Remote State)
  # ----------------------------------------------------------------
  # Worker-only Postgres for Terraform's `pg` backend. Deliberately
  # isolated from the application DB: the worker must never reach
  # the backend's data, only its own state store. One schema per
  # deployment (`deployment_<uuid>`) keeps the locking/state surface
  # tight. Not exposed on the host — internal to worker-network.
  postgres-tfstate:
    image: postgres:16-alpine
    container_name: postgres-tfstate-prod
    environment:
      POSTGRES_USER: ${TFSTATE_DB_USER:?TFSTATE_DB_USER is required}
      POSTGRES_PASSWORD: ${TFSTATE_DB_PASSWORD:?TFSTATE_DB_PASSWORD is required}
      POSTGRES_DB: ${TFSTATE_DB_NAME:?TFSTATE_DB_NAME is required}
    volumes:
      - postgres_tfstate_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TFSTATE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------------------------------
  # Keycloak database
  # ----------------------------------------------------------------
  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres-prod
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:?KEYCLOAK_DB_USER is required}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:?KEYCLOAK_DB_NAME is required}
    volumes:
      - keycloak_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keycloak-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ----------------------------------------------------------------
  # Imports the `dhbw` realm from keycloak/realm-export.json on first
  # boot (skipped once the realm exists in the persistent DB volume).
  #
  # NOTE: uses start-dev (HTTP, no hostname enforcement) — fine for a
  # staging VM reached over http://<ip>:8080. For real production
  # behind TLS, switch to `start` and set KC_HOSTNAME to the public URL.
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak-prod
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Tell Keycloak it sits behind a TLS-terminating proxy so it
      # builds HTTPS redirect URIs correctly from X-Forwarded-Proto.
      KC_PROXY: "edge"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - keycloak-network
      - backend-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # RabbitMQ (Celery broker)
  # ----------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-prod
    hostname: rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - worker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ----------------------------------------------------------------
  # Redis — Celery RESULT backend (broker is RabbitMQ above).
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-prod
    hostname: redis
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - worker-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Backend API (FastAPI)
  # ----------------------------------------------------------------
  # Migrations are applied by the Ansible playbook AFTER compose-up
  # (`docker exec backend-prod python -m alembic upgrade head`). Do
  # not re-introduce a backend-migrate init-container here — that
  # pattern hides migration failures inside the compose output.
  backend:
    image: ghcr.io/six7-click-n-deploy/backend:${BACKEND_VERSION:-latest}
    container_name: backend-prod
    # The backend image's venv is built at /build/.venv and copied to
    # /app/.venv, so the console scripts (`uvicorn`, `alembic`) carry a
    # stale build-time shebang (#!/build/.venv/bin/python) that doesn't
    # resolve at runtime. Invoke via `python -m` to bypass the broken
    # script. The Ansible playbook does the same for `alembic upgrade
    # head` after compose-up.
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--proxy-headers", "--forwarded-allow-ips", "*"]
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}

      # Security
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}

      # Celery (broker = RabbitMQ, result backend = Redis)
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      CELERY_RESULT_BACKEND: redis://redis:6379/0

      # Keycloak
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-dhbw}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-appstore-backend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-true}

      # Git
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN:?GIT_ACCESS_TOKEN is required}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}

      # Email (Gmail SMTP) — used by the post-deploy notify hook in
      # celery_event_listener.py. Leave SMTP_USER empty to disable
      # mail entirely; the notify hook turns into a no-op.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Click-n-Deploy}

      # Public base URL of the frontend, used in owner-summary mails
      # to deep-link back to the deployment detail page.
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}

      # Application
      DEBUG: "False"
      APP_NAME: ${APP_NAME:-Backend API}

      # Server
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: ${BACKEND_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - backend_git_repos:/tmp/repos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------
  # Worker Service (Celery)
  # ----------------------------------------------------------------
  # Worker has NO access to the application DB — it only talks to
  # RabbitMQ/Redis (Celery) and postgres-tfstate (Terraform state).
  worker:
    image: ghcr.io/six7-click-n-deploy/worker:${WORKER_VERSION:-latest}
    container_name: worker-prod
    environment:
      # Celery (broker = RabbitMQ, result backend = Redis)
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      CELERY_RESULT_BACKEND: redis://redis:6379/0

      # OpenStack credential decryption (must match backend)
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}

      # Terraform pg backend — isolated DB, NOT the application DB.
      # Worker uses one schema per deployment (deployment_<uuid>).
      TFSTATE_DATABASE_URL: postgresql://${TFSTATE_DB_USER}:${TFSTATE_DB_PASSWORD}@postgres-tfstate:5432/${TFSTATE_DB_NAME}?sslmode=disable

      # Git
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN:?GIT_ACCESS_TOKEN is required}

      # Application
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-tfstate:
        condition: service_healthy
    volumes:
      - worker_git_repos:/tmp/repos
    networks:
      - worker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------
  # nginx (TLS reverse proxy)
  # Terminates HTTPS on :443, redirects :80→:443, and proxies:
  #   /       → frontend:80
  #   /api/   → backend:8000   (strips /api/ prefix)
  #   /auth/  → keycloak:8080  (strips /auth/ prefix)
  # The self-signed certificate is generated by Ansible and lives at
  # ./nginx/certs/ on the VM (bind-mounted so it survives redeploys).
  # ----------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - frontend-network
      - backend-network
      - keycloak-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------
  # Frontend (Vue 3 SPA, served by nginx in the image)
  # ----------------------------------------------------------------
  frontend:
    image: ghcr.io/six7-click-n-deploy/frontend:${FRONTEND_VERSION:-latest}
    container_name: frontend-prod
    environment:
      NODE_ENV: production
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:?VITE_KEYCLOAK_URL is required}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-dhbw}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-appstore-frontend}
      VITE_APP_URL: ${VITE_APP_URL:?VITE_APP_URL is required}
      VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ----------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------
volumes:
  postgres_prod_data:
    driver: local
  postgres_tfstate_prod_data:
    driver: local
  keycloak_postgres_prod_data:
    driver: local
  rabbitmq_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  backend_git_repos:
    driver: local
  worker_git_repos:
    driver: local

# ----------------------------------------------------------------
# Networks
# ----------------------------------------------------------------
networks:
  frontend-network:
    driver: bridge
    name: frontend-network-prod
  backend-network:
    driver: bridge
    name: backend-network-prod
  worker-network:
    driver: bridge
    name: worker-network-prod
  keycloak-network:
    driver: bridge
    name: keycloak-network-prod
