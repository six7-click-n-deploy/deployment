name: CD - Staging Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Staging Deploy
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
    env:
      OS_AUTH_URL: ${{ secrets.STAGING_OS_AUTH_URL }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.STAGING_OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.STAGING_OS_APPLICATION_CREDENTIAL_SECRET }}
      OS_REGION_NAME: ${{ secrets.STAGING_OS_REGION_NAME }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # Staging is intentionally non-blocking: surfaces HIGH/CRITICAL IaC
      # findings without halting deploys.
      - name: Terraform Security Scan (Trivy)
        continue-on-error: true
        run: |
          trivy config --severity HIGH,CRITICAL infrastructure/terraform

      # SARIF emit so findings land in the Security tab even though the
      # gate above is non-blocking — keeps signal visible across runs.
      - name: Terraform Security Scan (Trivy, SARIF)
        if: always()
        run: |
          trivy config --severity HIGH,CRITICAL --format sarif --output trivy-iac.sarif infrastructure/terraform

      - name: Upload Trivy IaC results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac-staging

      - name: Set up SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf preserves the multi-line PEM newlines; quoting the env var
          # keeps the key out of the rendered script text.
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/openstack-key
          chmod 600 ~/.ssh/openstack-key
          # Derive the matching public key and hand it to Terraform so the
          # OpenStack keypair always matches this private key.
          # -P '' forces an empty passphrase: passphrase-protected keys fail
          # fast with a clear error instead of hanging on /dev/tty in CI.
          ssh-keygen -y -P '' -f ~/.ssh/openstack-key > ~/.ssh/openstack-key.pub
          echo "TF_VAR_ssh_public_key=$(cat ~/.ssh/openstack-key.pub)" >> "$GITHUB_ENV"

      - name: Terraform Init, Validate, Plan & Apply
        working-directory: infrastructure/terraform/envs/staging
        run: |
          terraform init
          terraform validate
          terraform plan -out=tfplan
          terraform apply tfplan
          echo "VM_IP=$(terraform output -raw vm_ip)" >> "$GITHUB_ENV"

      - name: Install Ansible and Dependencies
        run: |
          sudo apt-get install -y rsync python3-pip
          pip3 install --user "ansible>=8.0"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-galaxy role install -r infrastructure/ansible/requirements.yml -p infrastructure/ansible/roles_external
          ansible-galaxy collection install -r infrastructure/ansible/requirements.yml

      - name: Generate Ansible Inventory
        working-directory: infrastructure/ansible
        run: |
          cat > inventory.ini <<EOF
          [docker_vm]
          ${VM_IP} ansible_user=ubuntu
          EOF
          echo "Inventory:" && cat inventory.ini

      - name: Run Ansible Playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.ini \
            --private-key ~/.ssh/openstack-key deploy_staging.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}

      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f ~/.ssh/openstack-key ~/.ssh/openstack-key.pub
          rm -f infrastructure/ansible/inventory.ini
          echo "Sensitive deployment artifacts removed."