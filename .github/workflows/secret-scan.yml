name: Secret Scan

# Pre-merge gate for accidentally committed secrets (tokens, SSH keys,
# OpenStack application credentials). Runs on every PR and on push to
# main. Self-hosted runner to match the deploy workflows; gitleaks is
# fetched fresh per run via the upstream action.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: "🔒 Gitleaks"
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # gitleaks scans full history on push, diff-only on PR — both
          # need fetch-depth: 0 to compare against the base ref reliably.
          fetch-depth: 0

      - name: Run gitleaks (gate)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Emit SARIF so findings appear in the Security tab even when
          # the gate fails the job.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
