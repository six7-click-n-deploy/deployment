name: Secret Scan

# Pre-merge gate for accidentally committed secrets (tokens, SSH keys,
# OpenStack application credentials). Runs on every PR and on push to
# main. Uses the gitleaks CLI directly — the upstream gitleaks-action
# requires a paid license for organization repos, the binary is MIT.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: "🔒 Gitleaks"
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so gitleaks can scan all commits introduced
          # by the PR (or all of main on push).
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Two-pass pattern: blocking gate first, then SARIF emit so all
      # findings (incl. ignored ones in .gitleaksignore) end up in the
      # Security tab.
      - name: Gitleaks scan (gate)
        run: |
          gitleaks detect --source . --redact --verbose --exit-code 1

      - name: Gitleaks scan (SARIF for Security tab)
        if: always()
        run: |
          gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif --exit-code 0

      - name: Upload gitleaks results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
