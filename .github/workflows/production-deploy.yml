name: CD - Production Deployment

on:
  # Manual trigger for production safety
  workflow_dispatch:
  # Trigger on specific release tags
  push:
    tags:
      - 'v*'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    environment: 
      name: production
    env:
      OS_AUTH_URL: ${{ secrets.PRODUCTION_OS_AUTH_URL }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.PRODUCTION_OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.PRODUCTION_OS_APPLICATION_CREDENTIAL_SECRET }}
      OS_REGION_NAME: ${{ secrets.PRODUCTION_OS_REGION_NAME }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Security Scan (Trivy)
        # Non-blocking for now: surfaces HIGH/CRITICAL IaC findings without
        # failing the deploy. Flip to blocking by removing continue-on-error.
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy config --severity HIGH,CRITICAL infrastructure/terraform

      - name: Set up SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf preserves the multi-line PEM newlines; quoting the env var
          # keeps the key out of the rendered script text.
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/openstack-key
          chmod 600 ~/.ssh/openstack-key
          # Derive the matching public key and hand it to Terraform so the
          # OpenStack keypair always matches this private key.
          # -P '' forces an empty passphrase: passphrase-protected keys fail
          # fast with a clear error instead of hanging on /dev/tty in CI.
          ssh-keygen -y -P '' -f ~/.ssh/openstack-key > ~/.ssh/openstack-key.pub
          echo "TF_VAR_ssh_public_key=$(cat ~/.ssh/openstack-key.pub)" >> "$GITHUB_ENV"

      - name: Terraform Init, Validate, Plan & Apply
        # Note the directory change to 'production'
        working-directory: infrastructure/terraform/envs/production
        run: |
          terraform init
          terraform validate
          terraform plan -out=tfplan
          terraform apply tfplan
          echo "VM_IP=$(terraform output -raw vm_ip)" >> "$GITHUB_ENV"

      - name: Install Ansible and Dependencies
        run: |
          # Ubuntu 24.04 (noble) enforces PEP 668 — `pip install` system-wide
          # is refused. Use apt for Ansible itself; galaxy collections are
          # user-level and unaffected.
          sudo apt-get update
          # rsync is required by ansible.posix.synchronize (used to ship the
          # repo to the VM); not always present in catthehacker:act-latest.
          sudo apt-get install -y ansible rsync
          # Role + collections come from the pinned requirements file. The
          # geerlingguy.docker role is installed into ./roles_external (which
          # ansible.cfg's roles_path searches) since it is no longer vendored.
          ansible-galaxy role install -r infrastructure/ansible/requirements.yml -p infrastructure/ansible/roles_external
          ansible-galaxy collection install -r infrastructure/ansible/requirements.yml

      - name: Generate Ansible Inventory
        working-directory: infrastructure/ansible
        run: |
          cat > inventory.ini <<EOF
          [docker_vm]
          ${VM_IP} ansible_user=ubuntu
          EOF
          echo "Inventory:" && cat inventory.ini

      - name: Run Ansible Playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.ini \
            --private-key ~/.ssh/openstack-key deploy_production.yml \
            --extra-vars "env=production"
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'

      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f ~/.ssh/openstack-key ~/.ssh/openstack-key.pub
          rm -f infrastructure/ansible/inventory.ini
          # Clear terraform cache to prevent state leakage on self-hosted runner
          rm -rf infrastructure/terraform/envs/production/.terraform
          echo "Production deployment artifacts cleaned up."