# ============================================================================
# docker-compose.staging.yml — STAGING-ONLY override.
#
# Layered ON TOP of docker-compose.deploy.yml ( it is not standalone). Referenced
# only by the staging playbook (deploy_staging.yml):
#
#   docker compose -f docker-compose.deploy.yml \
#                  -f docker-compose.staging.yml up -d
#
# Purpose: swap the Keycloak realm-import file. docker-compose.deploy.yml mounts the clean
# production realm (keycloak/realm-export.json); here we mount keycloak/keycloak-export.json
# — the same `dhbw` realm but with test users (produced by `make keycloak-export`).
#
# The mount uses the SAME container target as docker-compose.deploy.yml, so compose merges by
# target path and REPLACES the source for staging only. Production never mounts
# this file, so it keeps the clean realm. Validate the merge with:
#   docker compose -f docker-compose.deploy.yml -f docker-compose.staging.yml config
# ============================================================================
services:
  keycloak:
    volumes:
      - ./keycloak/keycloak-export.json:/opt/keycloak/data/import/realm-export.json:ro
