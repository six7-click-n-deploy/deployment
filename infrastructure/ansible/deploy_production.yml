---
- name: 2. CONFIGURE Docker and Deploy Application on Production Environment
  hosts: docker_vm # Target the host group created by the Terraform inventory plugin
  become: yes
  gather_facts: yes

  vars:
    docker_users: ["ubuntu"]
    docker_install_compose: true
    project_root: "/home/ubuntu/app"
    local_compose_path: "{{ playbook_dir }}/../../"

  pre_tasks:
    - name: Verzeichnis für App erstellen
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

  roles:
    - role: geerlingguy.docker
      tags: [docker_install]

  tasks:
    - name: Docker-Compose Datei kopieren
      ansible.posix.synchronize:
        src: "{{ local_compose_path }}"
        dest: "{{ project_root }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.ssh"
          - "--exclude=.git"
          - "--exclude=.history"
          - "--exclude=docker-compose.override.yml"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"
          - "--exclude=.venv"
          - "--exclude=.terraform"
          - "--exclude=frontend/dist"
          - "--exclude=frontend/test-results"
          - "--exclude=frontend/blob-report"
          # model_files/*.gguf is multi-GB; the docker-compose model-downloader
          # service fetches the model on the VM, so we never ship it via rsync.
          - "--exclude=model_files"
          - "--exclude=.DS_Store"
          - "--exclude=*.pyc"

    - name: APP_BASE_URL aus .env lesen
      ansible.builtin.shell:
        cmd: |
          grep -E '^APP_BASE_URL=' "{{ project_root }}/.env" \
            | head -n1 | cut -d= -f2- | tr -d '"'"'"'\r'
        executable: /bin/bash
      register: app_base_url_raw
      changed_when: false

    - name: Self-signed TLS-Zertifikat generieren (falls nicht vorhanden)
      ansible.builtin.shell:
        cmd: |
          mkdir -p {{ project_root }}/nginx/certs
          if [ ! -f {{ project_root }}/nginx/certs/cert.pem ]; then
            openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout {{ project_root }}/nginx/certs/key.pem \
              -out    {{ project_root }}/nginx/certs/cert.pem \
              -subj "/CN={{ inventory_hostname }}" \
              -addext "subjectAltName=IP:{{ inventory_hostname }}"
            chmod 600 {{ project_root }}/nginx/certs/key.pem
            echo "cert generated"
          else
            echo "cert exists, skipped"
          fi
        executable: /bin/bash
      register: cert_result
      changed_when: "'cert generated' in cert_result.stdout"

    - name: Keycloak realm-export.json aus Template rendern
      ansible.builtin.template:
        src: "{{ local_compose_path }}/keycloak/realm-export.json.j2"
        dest: "{{ project_root }}/keycloak/realm-export.json"
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      vars:
        app_base_url: "{{ app_base_url_raw.stdout | trim }}"
        app_api_url: "{{ app_base_url_raw.stdout | trim }}/api"

    # nginx.conf is bind-mounted, so Compose has no way to detect a
    # content change and recreate the container. We hash the file and
    # put the hash into a docker label via NGINX_CONFIG_HASH — when the
    # hash changes the label changes, Compose sees a spec drift and
    # recreates nginx-prod on the next ``up``.
    - name: Compute nginx config hash
      ansible.builtin.shell:
        cmd: sha256sum {{ project_root }}/nginx/nginx.conf | cut -c1-12
        executable: /bin/bash
      register: nginx_config_hash
      changed_when: false

    - name: Persist NGINX_CONFIG_HASH in .env
      ansible.builtin.lineinfile:
        path: "{{ project_root }}/.env"
        line: "NGINX_CONFIG_HASH={{ nginx_config_hash.stdout }}"
        regexp: "^NGINX_CONFIG_HASH="
        create: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    # The six7-click-n-deploy images are PRIVATE, so the daemon must authenticate
    # to GHCR before `compose pull`. We read GIT_USER/GIT_ACCESS_TOKEN from the .env
    # that was just rsynced to the VM and log in via the docker CLI. --password-stdin
    # keeps the token out of the process args; the token only ever lives in a
    # runtime shell variable and on stdin (never in the task text or Ansible output).
    # No GIT_ACCESS_TOKEN in .env => login is skipped (e.g. if the packages are public).
    - name: Log in to GHCR using credentials from the deployed .env
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          env_file="{{ project_root }}/.env"
          token=$(grep -E '^GIT_ACCESS_TOKEN=' "$env_file" 2>/dev/null | head -n1 | cut -d= -f2- | tr -d '\042\047\r' || true)
          user=$(grep -E '^GIT_USER=' "$env_file" 2>/dev/null | head -n1 | cut -d= -f2- | tr -d '\042\047\r' || true)
          if [ -z "$token" ]; then
            echo "no GIT_ACCESS_TOKEN in $env_file - skipping GHCR login"
            exit 0
          fi
          echo "$token" | docker login ghcr.io --username "${user:-x}" --password-stdin
        executable: /bin/bash
      changed_when: true

    - name: Applikation mit Docker Compose starten
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        # deploy.yml = full standalone stack (GHCR images + redis + keycloak).
        files: ["docker-compose.deploy.yml"]
        pull: always
        state: present
      register: compose_output

    # Migrations live OUTSIDE the compose file on purpose: a previous
    # backend-migrate init container buried failure stderr inside the
    # compose JSON. Running alembic as its own playbook step surfaces
    # both the migration's exit code and its stderr directly in the
    # Ansible task output.
    - name: Wait for backend container to be running
      ansible.builtin.command: docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' backend-prod
      register: backend_running
      until: backend_running.stdout == "true"
      retries: 30
      delay: 2
      changed_when: false

    - name: Apply database migrations
      ansible.builtin.command: docker exec backend-prod python -m alembic upgrade head
      register: migration_result
      changed_when: "'Running upgrade' in migration_result.stdout"

    # Safety net for nginx.conf changes that the config_hash label
    # would normally catch — if the label-based recreate didn't fire
    # for some reason (manual edit, cache, etc.), a graceful reload
    # picks up the new config without downtime. ``-t`` validates first
    # so a broken config doesn't take nginx down.
    - name: Reload nginx config (catches volume-only changes)
      ansible.builtin.shell:
        cmd: docker exec nginx-prod sh -c 'nginx -t && nginx -s reload'
        executable: /bin/bash
      register: nginx_reload
      changed_when: "'signal process started' in nginx_reload.stdout or 'signal process started' in nginx_reload.stderr"
      failed_when: false

    - name: Status der Deployment anzeigen
      ansible.builtin.debug:
        var: compose_output
