---
- name: 2. CONFIGURE Docker and Deploy Application on Staging Environment
  hosts: docker_vm
  become: yes
  gather_facts: yes

  vars:
    docker_users: ["ubuntu"]
    docker_install_compose: true
    project_root: "/home/ubuntu/app"
    local_compose_path: "{{ playbook_dir }}/../../"

  pre_tasks:
    - name: Verzeichnis für App erstellen
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

  roles:
    - role: geerlingguy.docker
      tags: [docker_install]

  tasks:
    - name: Docker-Compose Datei kopieren
      ansible.posix.synchronize:
        src: "{{ local_compose_path }}"
        dest: "{{ project_root }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.ssh"
          - "--exclude=.git"
          - "--exclude=.history"
          - "--exclude=docker-compose.override.yml"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"
          - "--exclude=.venv"
          - "--exclude=.terraform"
          - "--exclude=frontend/dist"
          - "--exclude=frontend/test-results"
          - "--exclude=frontend/blob-report"
          - "--exclude=.DS_Store"
          - "--exclude=*.pyc"
          - "--exclude=.env"

    - name: .env auf VM schreiben
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STAGING_ENV_FILE') }}"
        dest: "{{ project_root }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Log in to GHCR using credentials from the deployed .env
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          env_file="{{ project_root }}/.env"
          token=$(grep -E '^GIT_ACCESS_TOKEN=' "$env_file" 2>/dev/null | head -n1 | cut -d= -f2- | tr -d '\042\047\r' || true)
          user=$(grep -E '^GIT_USER=' "$env_file" 2>/dev/null | head -n1 | cut -d= -f2- | tr -d '\042\047\r' || true)
          if [ -z "$token" ]; then
            echo "no GIT_ACCESS_TOKEN in $env_file - skipping GHCR login"
            exit 0
          fi
          echo "$token" | docker login ghcr.io --username "${user:-x}" --password-stdin
        executable: /bin/bash
      changed_when: true

    - name: Pull alle Images
      ansible.builtin.shell:
        cmd: docker compose -f docker-compose.deploy.yml pull
        chdir: "{{ project_root }}"
      changed_when: true
      async: 600
      poll: 30

    - name: GHCR credentials aus root-Store entfernen
      ansible.builtin.file:
        path: /root/.docker/config.json
        state: absent

    - name: Start the application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        files: ["docker-compose.deploy.yml"]
        pull: never
        state: present
      register: compose_output

    - name: Status der Deployment anzeigen
      ansible.builtin.debug:
        var: compose_output