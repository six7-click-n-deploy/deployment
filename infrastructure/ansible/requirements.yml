---
# External Ansible dependencies for the deploy playbooks. Installed in CI via
# `ansible-galaxy ... -r requirements.yml`. The geerlingguy.docker role is NOT
# vendored in the repo — it is fetched from Galaxy at deploy time, so this file
# is the single source of truth. Pin versions for reproducibility.

roles:
  - name: geerlingguy.docker
    version: 7.1.0

collections:
  - name: community.docker # docker_compose_v2
  - name: ansible.posix    # synchronize
