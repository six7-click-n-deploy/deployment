events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver. Required for variable-based proxy_pass
    # so nginx re-resolves upstream hostnames dynamically after container
    # restarts instead of caching the IP at startup.
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------------------------------
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------
    # HTTPS — TLS termination + reverse proxy
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---- Keycloak (/auth/) ----
        # Must be before / so it takes precedence over the SPA catch-all.
        # Variable-based proxy_pass enables dynamic DNS re-resolution.
        location /auth/ {
            set $keycloak http://keycloak:8080;
            proxy_pass $keycloak;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Keycloak redirects can include large headers (OIDC tokens).
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ---- Backend API (/api/) ----
        # rewrite strips /api/ prefix before passing to backend:8000.
        location /api/ {
            set $backend http://backend:8000;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass $backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50m;
        }

        # ---- Frontend SPA (catch-all) ----
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
