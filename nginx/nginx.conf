events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------
    # Upstream services (internal Docker DNS)
    # ----------------------------------------------------------------
    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8000;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------------------------------
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------
    # HTTPS — TLS termination + reverse proxy
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---- Keycloak (/auth/) ----
        # Must be before / so it takes precedence over the SPA catch-all.
        location /auth/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Keycloak redirects can include large headers (OIDC tokens).
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ---- Backend API (/api/) ----
        # Trailing slash on proxy_pass strips the /api/ prefix so the
        # backend receives /deployments/, /apps/, etc. as it expects.
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Allow large file uploads (deployment files, app images).
            client_max_body_size 50m;
        }

        # ---- Frontend SPA (catch-all) ----
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
